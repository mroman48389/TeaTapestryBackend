# CD that deploys Tea Tapestry Backend to Fly.io. Runs on pushes to the main branch only. Our production
# deployment pipeline. 
name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to production
        run: flyctl deploy --remote-only --app tea-tapestry-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_PRODUCTION_API_TOKEN }}

      # Run migrations from inside Fly instead of GitHub Actions, as it's safer and avoids IPv6 issues, 
      # Supabase firewall, etc.
      - name: Run database migrations
        run: flyctl ssh console --app tea-tapestry-backend --command "cd /app && alembic upgrade head"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_PRODUCTION_API_TOKEN }}

      - name: Run smoke tests
        run: |
          echo "Checking root..."
          curl -f https://tea-tapestry-backend.fly.dev/ || exit 1

          echo "Checking version..."
          curl -f https://tea-tapestry-backend.fly.dev/version || exit 1

          echo "Checking health..."
          curl -f https://tea-tapestry-backend.fly.dev/health || exit 1

          echo "Checking resource connections..."
          curl -f https://tea-tapestry-backend.fly.dev/health/connections || exit 1

          echo "All production smoke tests passed."
