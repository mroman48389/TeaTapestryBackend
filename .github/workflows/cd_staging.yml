# CD that deploys Tea Tapestry Backend Staging to Fly.io. Runs on pushes to the develop branch only. Our staging
# deployment pipeline. 
name: Staging Deployment

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_API_TOKEN }}
        run: |
          flyctl deploy --remote-only --app ${{ secrets.FLY_STAGING_APP_NAME }}

      # Run migrations from inside Fly instead of GitHub Actions, as it's safer and avoids IPv6 issues, 
      # Supabase firewall, etc.
      - name: Run database migrations
        run: flyctl ssh console --app ${{ secrets.FLY_STAGING_APP_NAME }} --command 'sh -c "cd /app && alembic upgrade head"'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_API_TOKEN }}

      - name: Run smoke tests
        run: |
          echo "Checking root..."
          curl -f https://${{ secrets.FLY_STAGING_APP_NAME }}.fly.dev/ || exit 1

          echo "Checking version..."
          curl -f https://${{ secrets.FLY_STAGING_APP_NAME }}.fly.dev/version || exit 1

          echo "Checking health..."
          curl -f https://${{ secrets.FLY_STAGING_APP_NAME }}.fly.dev/health || exit 1

          echo "Checking resource connections..."
          curl -f https://${{ secrets.FLY_STAGING_APP_NAME }}.fly.dev/health/connections || exit 1

          echo "All staging smoke tests passed."