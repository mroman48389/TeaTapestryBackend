app = "tea-tapestry-backend"
primary_region = "iad"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"
  PYTHONPATH = "/workspace"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[checks]
  [checks.health]
    type = "http"
    port = 8080
    method = "get"
    path = "/health"
    interval = "10s"
    timeout = "2s"
